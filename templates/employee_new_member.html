<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitSync — Register Member</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="dashboard-body">

    {% if error %}
        <div class="form-error">{{ error }}</div>
    {% endif %}

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">Fit<span>Sync</span></div>

            <div class="sidebar-section-label">EMPLOYEE PORTAL</div>

            <nav class="sidebar-nav">
                <a href="/employee/{{ emp_id }}/members" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-users"></i></span>
                    <span>Members</span>
                </a>

                <a href="/employee/{{ emp_id }}/members/new" class="nav-link active">
                    <span class="nav-icon"><i class="fa-solid fa-user-plus"></i></span>
                    <span>Register Member</span>
                </a>

                <a href="/employee/{{ emp_id }}/checkins" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-location-dot"></i></span>
                    <span>Record Check-In</span>
                </a>

                <a href="/employee/{{ emp_id }}/classes" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-calendar-days"></i></span>
                    <span>Class Schedule</span>
                </a>

                <a href="/employee/{{ emp_id }}/classes/new" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-plus"></i></span>
                    <span>Create Class</span>
                </a>

                <a href="/employee/{{ emp_id }}/attendance" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-check"></i></span>
                    <span>Class Attendance</span>
                </a>

                <a href="/employee/{{ emp_id }}/equipment" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-wrench"></i></span>
                    <span>Equipment</span>
                </a>

                <a href="/employee/{{ emp_id }}/tickets" class="nav-link">
                    <span class="nav-icon"><i class="fa-solid fa-ticket"></i></span>
                    <span>Tickets</span>
                </a>
            </nav>

            <div class="sidebar-spacer"></div>

            <a href="/" class="signout-link">
                <span class="nav-icon"><i class="fa-solid fa-arrow-left"></i></span>
                <span>Sign Out</span>
            </a>
        </aside>

        <main class="dashboard-main">
            <div class="page-header">
                <h1 class="page-title">Register Member</h1>
                <p class="page-subtitle">Create a new member account</p>
            </div>

            <section class="panel-card register-member-card">
                <form method="post" action="/employee/{{ emp_id }}/members/create">
                    <div class="panel-title">MEMBER INFORMATION</div>

                    <div class="form-two-col">
                        <div class="field-block">
                            <label for="mem_fname">First Name *</label>
                            <input type="text" id="mem_fname" name="mem_fname" class="field-input"
                                value="{{ form_data.mem_fname if form_data else '' }}"
                                placeholder="First name" maxlength="45" required>
                        </div>

                        <div class="field-block">
                            <label for="mem_lname">Last Name *</label>
                            <input type="text" id="mem_lname" name="mem_lname" class="field-input"
                                value="{{ form_data.mem_lname if form_data else '' }}"
                                placeholder="Last name" maxlength="45" required>
                        </div>
                    </div>

                    <div class="form-two-col">
                        <div class="field-block">
                            <label for="mem_dob">Date of Birth *</label>
                            <input type="date" id="mem_dob" name="mem_dob" class="field-input"
                                value="{{ form_data.mem_dob if form_data else '' }}" required>
                        </div>

                        <div class="field-block">
                            <label for="mem_phone">Phone *</label>
                            <input type="text" id="mem_phone" name="mem_phone" class="field-input phone-input"
                                value="{{ form_data.mem_phone if form_data else '' }}"
                                placeholder="(248)-600-3001" maxlength="15" required>
                        </div>
                    </div>

                    <div class="field-block">
                        <label for="mem_email">Email *</label>
                        <input type="email" id="mem_email" name="mem_email" class="field-input"
                            value="{{ form_data.mem_email if form_data else '' }}"
                            placeholder="Email address" maxlength="45" required>
                    </div>

                    <div class="field-block">
                        <label for="tier_id">Membership Tier *</label>
                        <select id="tier_id" name="tier_id" class="field-input" required>
                            <option value="1" {% if form_data and form_data.tier_id == '1' %}selected{% endif %}>Basic — $25.00/mo</option>
                            <option value="2" {% if form_data and form_data.tier_id == '2' %}selected{% endif %}>Premium — $40.00/mo</option>
                        </select>
                    </div>

                    <div class="panel-title register-section-spacing">EMERGENCY CONTACT</div>

                    <div class="form-two-col">
                        <div class="field-block">
                            <label for="econ_fname">First Name *</label>
                            <input type="text" id="econ_fname" name="econ_fname" class="field-input"
                                value="{{ form_data.econ_fname if form_data else '' }}"
                                placeholder="First name" maxlength="45" required>
                        </div>

                        <div class="field-block">
                            <label for="econ_lname">Last Name *</label>
                            <input type="text" id="econ_lname" name="econ_lname" class="field-input"
                                value="{{ form_data.econ_lname if form_data else '' }}"
                                placeholder="Last name" maxlength="45" required>
                        </div>
                    </div>

                    <div class="field-block">
                        <label for="econ_phone">Phone *</label>
                        <input type="text" id="econ_phone" name="econ_phone" class="field-input phone-input"
                            value="{{ form_data.econ_phone if form_data else '' }}"
                            placeholder="(248)-600-3001" maxlength="15" required>
                    </div>

                    <div class="register-actions">
                        <button type="submit" class="action-btn">Create Account</button>
                        <a href="/employee/{{ emp_id }}/members" class="cancel-link">Cancel</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

<script>
    function formatPhoneInput(input) {
        let digits = input.value.replace(/\D/g, "").slice(0, 10);

        if (digits.length === 0) {
            input.value = "";
        } else if (digits.length < 4) {
            input.value = `(${digits}`;
        } else if (digits.length < 7) {
            input.value = `(${digits.slice(0, 3)})-${digits.slice(3)}`;
        } else {
            input.value = `(${digits.slice(0, 3)})-${digits.slice(3, 6)}-${digits.slice(6, 10)}`;
        }
    }

    const phoneInputs = document.querySelectorAll(".phone-input");

    phoneInputs.forEach((input) => {
        input.addEventListener("input", function () {
            formatPhoneInput(this);
        });
    });
</script>

</body>
</html>
